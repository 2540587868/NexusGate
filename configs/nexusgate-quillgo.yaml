server:
  listen: ":9090"
  metrics_listen: ":9091"
  dashboard_listen: ":9092"
  dashboard_token: "nexusgate-admin-2026"

gateway:
  shard_count: 4
  worker_per_shard: 1
  queue_size: 2048
  slow_recovery_threshold: 0.9

proxy:
  default_mode: "splice"
  connect_timeout: 3s
  read_timeout: 30s
  write_timeout: 30s
  pool_size: 128
  pool_max_idle: 32

router:
  default_strategy: "weighted_round_robin"

middleware:
  order:
    - trace
    - auth
    - ratelimit
    - cors
    - circuitbreaker
  trace:
    service_name: "nexusgate"
    endpoint: ""
  auth:
    type: "none"
    skip_paths:
      - "/healthz"
      - "/metrics"
      - "/public/*"
  ratelimit:
    requests_per_second: 500
    burst: 1000
  cors:
    allow_origins:
      - "https://your-blog-domain.com"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    allow_headers:
      - "Authorization"
      - "Content-Type"
    allow_credentials: true
    max_age: 3600
  circuitbreaker:
    failure_threshold: 5
    success_threshold: 3
    timeout: 30s

lifecycle:
  graceful_timeout: 15s
  recoverable: true
  health_check:
    interval: 10s
    timeout: 5s
    unhealthy_threshold: 3

logging:
  level: "info"
  format: "json"
  access_log: true

routes:
  - match:
      path_prefix: "/api/"
    backend:
      - address: "host.docker.internal:8080"
        weight: 1
    strategy: "weighted_round_robin"

  - match:
      path_prefix: "/"
    backend:
      - address: "host.docker.internal:8080"
        weight: 1
    strategy: "weighted_round_robin"
