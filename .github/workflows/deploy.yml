name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexusgate
  DOCKER_BUILDKIT: 1
  GO_VERSION: '1.26'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go Test
        run: go test ./... -count=1 -race -parallel=4 -timeout 120s

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/nexusgate-data

            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml not found"
              exit 1
            fi

            IMAGE="ghcr.io/${{ github.repository_owner }}/nexusgate:latest"
            CURRENT_IMAGE=$(docker compose images -q nexusgate 2>/dev/null || echo "")
            if [ -n "$CURRENT_IMAGE" ]; then
              docker tag $CURRENT_IMAGE nexusgate-rollback:latest 2>/dev/null || true
            fi

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker compose pull nexusgate
            docker compose up -d --no-build --force-recreate

            for i in $(seq 1 10); do
              if docker compose ps --format json 2>/dev/null | grep -q '"running"'; then
                break
              fi
              sleep 1
            done

            if ! docker compose ps --format json 2>/dev/null | grep -q '"running"'; then
              echo "ERROR: nexusgate container is not running!"
              docker compose logs --tail=50 nexusgate 2>&1 || true
              exit 1
            fi

            HEALTHY=0
            for i in $(seq 1 15); do
              if docker compose exec -T nexusgate curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Health check passed!"
                HEALTHY=1
                break
              fi
              sleep 2
            done
            if [ $HEALTHY -eq 0 ]; then
              echo "WARNING: Health endpoint not responding after 30s"
              docker compose logs --tail=20 nexusgate 2>&1 || true
            fi

            docker image prune -f
            echo "Deploy complete! $(date)"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/nexusgate-data
            if docker images nexusgate-rollback | grep -q nexusgate-rollback; then
              echo "Rolling back to previous image..."
              docker tag nexusgate-rollback:latest ghcr.io/${{ github.repository_owner }}/nexusgate:latest
              docker compose up -d --no-build --force-recreate
              sleep 5
              if docker compose exec -T nexusgate curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Rollback successful!"
              else
                echo "Rollback failed! Manual intervention required."
              fi
            else
              echo "No rollback image available"
            fi
