name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexusgate

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Login to GHCR on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 30s
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u 2540587868 --password-stdin
            echo "GHCR login success"

      - name: Pull latest image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            cd /opt/nexusgate-data
            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml not found in /opt/nexusgate-data"
              exit 1
            fi
            sed -i 's|image: nexusgate:latest|image: ghcr.io/2540587868/nexusgate:latest|g' docker-compose.yml
            sed -i 's|image: ghcr.io/.*/nexusgate:latest|image: ghcr.io/2540587868/nexusgate:latest|g' docker-compose.yml
            echo "Image name in docker-compose.yml:"
            grep 'image:' docker-compose.yml | head -1
            docker compose pull nexusgate
            echo "Image pull success"

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 60s
          script: |
            cd /opt/nexusgate-data
            docker compose up -d --no-build --force-recreate
            docker image prune -f
            echo "Deploy complete! $(date)"
