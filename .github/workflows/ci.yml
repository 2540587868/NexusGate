name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags "-X main.version=ci -X main.gitCommit=${{ github.sha }} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" ./cmd/nexusgate/

      - name: Test
        run: go test ./... -count=1 -timeout 120s -race -parallel=4 -coverprofile=coverage.out

      - name: Coverage report
        run: |
          echo "## Test Coverage"
          go tool cover -func=coverage.out | tail -1
          echo ""
          echo "### Per-package coverage"
          go tool cover -func=coverage.out | grep -E "^github.com/nexusgate/nexusgate/internal/" | sort -t: -k2 -n

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m
          skip-cache: true
          skip-save-cache: true
          verify: false

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nexusgate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
