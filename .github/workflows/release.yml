name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version info
        id: info
        run: |
          echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ steps.info.outputs.version }}
          COMMIT: ${{ steps.info.outputs.commit }}
          BUILDTIME: ${{ steps.info.outputs.build_time }}
          LDFLAGS: >-
            -X main.version=${{ steps.info.outputs.version }}
            -X main.gitCommit=${{ steps.info.outputs.commit }}
            -X main.buildTime=${{ steps.info.outputs.build_time }}
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/nexusgate-linux-amd64 ./cmd/nexusgate/
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/nexusgate-linux-arm64 ./cmd/nexusgate/
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/nexusgate-darwin-amd64 ./cmd/nexusgate/
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/nexusgate-darwin-arm64 ./cmd/nexusgate/
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/nexusgate-windows-amd64.exe ./cmd/nexusgate/

          sha256sum dist/* > dist/checksums.txt
          cat dist/checksums.txt

      - name: Run tests
        run: go test ./... -count=1 -timeout 120s -race

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nexusgate-linux-amd64
            dist/nexusgate-linux-arm64
            dist/nexusgate-darwin-amd64
            dist/nexusgate-darwin-arm64
            dist/nexusgate-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true
          body: |
            ## NexusGate ${{ steps.info.outputs.version }}

            **Commit**: `${{ steps.info.outputs.commit }}`
            **Built**: ${{ steps.info.outputs.build_time }}

            ### Quick Start
            ```bash
            # Linux amd64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.info.outputs.version }}/nexusgate-linux-amd64
            chmod +x nexusgate-linux-amd64
            ./nexusgate-linux-amd64 -config configs/nexusgate.yaml

            # Check version
            ./nexusgate-linux-amd64 -version
            ```

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.info.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
